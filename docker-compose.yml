services:
  atlas:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - atlas-data:/app/data   # persists atlas.db across container restarts
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - NvdApiKey=${NVD_API_KEY:-}   # set NVD_API_KEY in your shell or a .env file
    restart: unless-stopped

volumes:
  atlas-data:
